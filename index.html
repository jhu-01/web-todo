<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--브라우저 크기 자동 조정-->
    <title>Web Todo</title>
</head>
<body>
    <div class="container">
        <main>
            <div class="task-list">
                <header>
                    <h1>Today's Tasks</h1>
                </header>
                    <h2>
                        <script>
                            let today = new Date();
                            document.write(`${today.getFullYear()}Y ${today.getMonth()+1 < 10 ? '0' + (today.getMonth()+1) : today.getMonth()+1}M ${today.getDate() < 10 ? '0' + today.getDate() : today.getDate()}D`);
                            <!--오늘 날짜 표시-->
                        </script>
                    </h2>
                <div class="input-layer">
                    <input type="text" id="todo-input" autocomplete="off" placeholder="Add a new task...">
                    <button id="add-btn">+</button>
                <!-- todo-input 입력 내용 / add-btn 버튼 -->
                </div> 
                <ul id="todo-list" class="list-layer">
                    <li>
                        <input type="checkbox" class="checkbox">
                        <span>Study</span>
                        <button class='del-btn'>🗑</button>
                    </li>
                    <li>
                        <input type="checkbox" class="checkbox">
                        <span>Work out</span>
                        <button class='del-btn'>🗑</button>
                    </li>
                     
                </ul>
                <!-- todo-list 목록-->
            </div>
        </main>
    </div>
        <footer>
            <p> 서울대학교 컴퓨터공학부 정현우 | exile1111@snu.ac.kr </p>
        </footer>
    <script type="module" src="/src/main.js"></script> <!--src/main.js 파일 연결-->
</body>
</html>
